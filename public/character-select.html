<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>캐릭터 선택</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<link rel="stylesheet" href="css/design-system.css">
<link rel="stylesheet" href="css/character-select.css">
</head>
<body>

<!-- ── 헤더 ── -->
<div class="page-header">
  <p class="scenario-label" id="scenarioLabel">로딩 중...</p>
  <h1 class="scenario-title">대화할 인물을 선택하세요</h1>
  <p class="scenario-desc" id="scenarioDesc">시나리오 정보를 불러오는 중입니다.</p>

  <div class="header-actions">
    <!-- 범례 -->
    <span class="selection-hint">
      <span class="hint-dot selectable"></span>선택 가능
    </span>
    <span class="selection-hint">
      <span class="hint-dot context"></span>컨텍스트 (선택 불가)
    </span>
  </div>
</div>

<!-- ── 카드 그리드 (JS 동적 렌더) ── -->
<div class="card-grid" id="cardGrid">
  <div class="loading-state grid-span-full" id="loadingState">
    <p>캐릭터 정보를 불러오는 중...</p>
  </div>
</div>

<!-- ── 선택 확인 바 ── -->
<div class="start-bar" id="startBar">
  <div class="selected-info">
    <div class="selected-avatar" id="selectedAvatar"></div>
    <div>
      <p class="selected-name" id="selectedName">—</p>
      <p class="selected-role" id="selectedRole">선택된 캐릭터</p>
    </div>
  </div>
  <button class="start-btn" id="startBtn">
    대화 시작하기
    <svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
  </button>
</div>

<script src="js/character-select.js" defer></script>
</body>
</html>
