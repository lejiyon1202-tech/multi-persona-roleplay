<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>내 역할 선택</title>

<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<link rel="stylesheet" href="css/design-system.css">
<link rel="stylesheet" href="css/character-select.css">
<link rel="stylesheet" href="css/character-select-hero.css">
<link rel="stylesheet" href="css/character-select-radial.css">
<link rel="stylesheet" href="css/character-select-modal.css">
</head>
<body>

<!-- ── 시나리오 히어로 (JS 주입) ── -->
<div id="sceneHero" class="scenario-hero hidden" aria-label="시나리오 상황 개요"></div>

<!-- ── 헤더 ── -->
<div class="page-header">
  <div class="header-meta">
    <p class="scenario-label" id="scenarioLabel">로딩 중...</p>
    <div class="step-indicator">
      <span class="step active">1단계 내 역할</span>
      <span class="step-arrow">→</span>
      <span class="step">2단계 대화 상대</span>
      <span class="step-arrow">→</span>
      <span class="step">대화 시작</span>
    </div>
  </div>

  <h1 class="scenario-title">당신이 연기할 캐릭터를 선택하세요</h1>
  <p class="scenario-subtitle">선택한 캐릭터로 상황에 몰입해 대화합니다. 캐릭터의 배경·가치관·미션을 읽고 선택하세요.</p>

  <!-- 학습자 역할 브리핑 카드 -->
  <div class="learner-briefing" id="learnerBriefing">
    <div class="briefing-inner">
      <div class="briefing-role">
        <span class="briefing-label">시나리오 상황</span>
        <span class="briefing-value" id="learnerBrief">—</span>
      </div>
      <div class="briefing-divider"></div>
      <div class="briefing-mission">
        <span class="briefing-label">핵심 학습 목표</span>
        <span class="briefing-value" id="learnerMission">—</span>
      </div>
    </div>
  </div>
</div>

<!-- ── 조직도 트리 (D안·JS 동적 렌더) ── -->
<div id="orgChart" class="org-chart" role="tree" aria-label="시나리오 조직 구조도">
  <div class="loading-state grid-span-full" id="loadingState">
    <div class="spinner"></div>
    <p>캐릭터 정보를 불러오는 중...</p>
  </div>
</div>

<!-- ── 캐릭터 상세 모달 (2열 분리: 아이덴티티 + 상세정보) ── -->
<div class="char-modal-overlay hidden" id="charModalOverlay">
  <div class="char-modal" id="charModal">
    <button class="modal-close" id="modalClose" aria-label="닫기">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
    </button>
    <!-- 왼쪽: 아이덴티티 패널 -->
    <div class="modal-left-panel" id="modalAccentBar">
      <span class="role-badge" id="modalRoleBadge">역할</span>
      <h2 class="modal-name" id="modalName">이름</h2>
      <p class="modal-dept" id="modalDept">직책</p>
      <div class="modal-panel-divider"></div>
      <blockquote class="modal-mindset" id="modalMindset"></blockquote>
    </div>
    <!-- 오른쪽: 탭 분할 패널 -->
    <div class="modal-right-panel">
      <!-- 탭 버튼 -->
      <div class="modal-tabs" role="tablist" aria-label="캐릭터 정보 탭">
        <button class="modal-tab active" role="tab" aria-selected="true" data-tab="profile">프로필</button>
        <button class="modal-tab" role="tab" aria-selected="false" data-tab="relation">관계</button>
        <button class="modal-tab" role="tab" aria-selected="false" data-tab="emotion">감정 흐름</button>
      </div>

      <!-- 탭 1: 프로필 -->
      <div class="modal-tab-panel active" id="tabProfile" data-panel="profile">
        <div class="modal-section">
          <p class="modal-section-label">배경 · 경력</p>
          <p class="modal-section-text" id="modalBackground">—</p>
        </div>
        <div class="modal-divider"></div>
        <div class="modal-section">
          <p class="modal-section-label">핵심 가치관</p>
          <p class="modal-section-text" id="modalValues">—</p>
        </div>
        <div class="modal-divider"></div>
        <div class="modal-section">
          <p class="modal-section-label">말투 · 발화 스타일</p>
          <p class="modal-section-text" id="modalSpeechStyle">—</p>
        </div>
        <div class="modal-divider"></div>
        <div class="modal-section">
          <p class="modal-section-label">직면한 압박 · 갈등</p>
          <p class="modal-section-text" id="modalPressure">—</p>
        </div>
        <div class="modal-divider"></div>
        <div class="modal-section">
          <p class="modal-section-label">학습 미션</p>
          <p class="modal-section-text" id="modalMission">—</p>
        </div>
      </div>

      <!-- 탭 2: 관계 -->
      <div class="modal-tab-panel" id="tabRelation" data-panel="relation">
        <div class="modal-section">
          <p class="modal-section-label">주요 인물 관계 · 태도</p>
          <p class="modal-section-text" id="modalRelationships">—</p>
        </div>
      </div>

      <!-- 탭 3: 감정 흐름 -->
      <div class="modal-tab-panel" id="tabEmotion" data-panel="emotion">
        <div class="modal-section">
          <p class="modal-section-label">감정 흐름 (방어→저항→수용)</p>
          <p class="modal-section-text" id="modalEmotionalStates">—</p>
        </div>
        <div class="modal-hint-wrap hidden" id="modalHintWrap">
          <div class="modal-divider"></div>
          <div class="modal-section">
            <p class="modal-section-label">💡 이 역할로 말문 트기</p>
            <div id="modalHints"></div>
          </div>
        </div>
      </div>

      <!-- CTA: 항상 표시 -->
      <div class="modal-cta">
        <button class="modal-start-btn" id="modalSelectBtn">
          이 역할 맡기
          <svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<script src="js/org-tree.js" defer></script>
<script src="js/radial-network.js" defer></script>
<script src="js/character-select.js" defer></script>
</body>
</html>
