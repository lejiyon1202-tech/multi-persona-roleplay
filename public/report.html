<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>평가 리포트</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<link rel="stylesheet" href="css/design-system.css">
<link rel="stylesheet" href="css/report.css">
</head>
<body>

<!-- ── 헤더 ── -->
<header class="page-header">
  <button class="btn btn-secondary btn-sm-md" id="backBtn">
    ← 돌아가기
  </button>
  <div class="header-logo">평가 리포트</div>
</header>

<main class="page-wrap">

  <!-- ── 탭 ── -->
  <div class="report-tabs">
    <button class="report-tab active" data-tab="single">이번 세션 리포트</button>
    <button class="report-tab" data-tab="compare">캐릭터별 비교</button>
  </div>

  <!-- ── 단일 세션 탭 ── -->
  <div class="tab-panel active" id="tabSingle">
    <!-- 총점 히어로 -->
    <div class="score-hero" id="scoreHero">
      <div class="score-circle partial" id="scoreCircle">
        <span class="score-num" id="scoreNum">—</span>
        <span class="score-max">/ 25</span>
      </div>
      <div class="score-info">
        <p class="score-grade" id="scoreGrade">결과를 불러오는 중...</p>
        <p class="score-char" id="scoreChar">
          <span class="role-badge lead" id="charBadge">파트장</span>
          <span id="charNameDisplay">이모델 파트장</span>
        </p>
      </div>
      <button class="score-retry-btn" id="retryBtn">
        <svg viewBox="0 0 24 24"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10M23 14l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
        다시 도전
      </button>
    </div>

    <!-- 점수 바 -->
    <div class="score-bars" id="scoreBars">
      <div class="score-bar-row">
        <div class="score-bar-header">
          <span class="score-bar-label">R-26 기본 역량 (15점)</span>
          <span class="score-bar-val" id="r26Val">— / 15</span>
        </div>
        <div class="score-bar-track">
          <div class="score-bar-fill r26" id="r26Bar"></div>
        </div>
      </div>
      <div class="score-bar-row">
        <div class="score-bar-header">
          <span class="score-bar-label">R-27 셀프 러닝 적합성 (5점)</span>
          <span class="score-bar-val" id="r27Val">— / 5</span>
        </div>
        <div class="score-bar-track">
          <div class="score-bar-fill r27" id="r27Bar"></div>
        </div>
      </div>
      <div class="score-bar-row">
        <div class="score-bar-header">
          <span class="score-bar-label">R-28 다중 페르소나 특화 (5점)</span>
          <span class="score-bar-val" id="r28Val">— / 5</span>
        </div>
        <div class="score-bar-track">
          <div class="score-bar-fill r28" id="r28Bar"></div>
        </div>
      </div>
    </div>

    <!-- 역량 레이더 차트 (Phase D-2) -->
    <div class="radar-section hidden" id="radarSection">
      <p class="section-label-sm">역량 분석</p>
      <div class="radar-card">
        <svg class="radar-svg" id="radarChart" viewBox="0 0 220 220" aria-label="역량 레이더 차트"></svg>
        <div class="radar-legend" id="radarLegend"></div>
      </div>
    </div>

    <!-- 핵심 발화 하이라이트 (Phase D-2) -->
    <div class="highlight-section hidden" id="highlightSection">
      <p class="section-label-sm">발화 분석</p>
      <div class="highlight-grid" id="highlightGrid"></div>
    </div>

    <!-- 감정 변화 타임라인 (Phase D-2) -->
    <div class="emotion-track-section hidden" id="emotionTrackSection">
      <p class="section-label-sm">감정 변화 흐름</p>
      <div class="emotion-track" id="emotionTrack"></div>
    </div>

    <!-- 세부 피드백 -->
    <div class="feedback-section" id="feedbackSection">
      <p class="feedback-section-title">세부 피드백</p>
      <div id="feedbackCards">
        <div class="empty-state">
          <div class="spinner"></div>
        </div>
      </div>
    </div>

    <!-- 다음 도전 추천 (Phase D-2) -->
    <div class="next-section hidden" id="nextSection">
      <p class="section-label-sm">다음 도전</p>
      <div class="next-grid" id="nextGrid"></div>
    </div>

    <!-- 학습 가이드 (Phase D-2) -->
    <div class="guide-section hidden" id="guideSection">
      <p class="section-label-sm">실무 적용 가이드</p>
      <div class="guide-box" id="guideBox"></div>
    </div>
  </div>

  <!-- ── 비교 탭 ── -->
  <div class="tab-panel" id="tabCompare">
    <div id="compareContent">
      <div class="compare-empty">
        <div class="empty-state-icon">📊</div>
        <p class="empty-state-title">같은 시나리오를 2번 이상 도전하면<br>캐릭터별 비교 리포트가 표시됩니다</p>
        <p class="empty-state-desc">다른 캐릭터로 다시 도전해보세요</p>
      </div>
    </div>
  </div>

</main>

<script src="js/report.js" defer></script>
</body>
</html>
