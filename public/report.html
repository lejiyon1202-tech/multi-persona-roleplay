<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>평가 리포트 — Multi-Persona Roleplay</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<link rel="stylesheet" href="css/design-system.css">
<style>

/* ═══════════════════════════════════════════════
   리포트 화면 전용 스타일
   ═══════════════════════════════════════════════ */
.page-wrap { max-width: 900px; margin: 0 auto; padding: 32px 40px 80px; }
@media (max-width: 767px) { .page-wrap { padding: 20px 16px 60px; } }

/* ── 탭 ── */
.report-tabs {
  display: flex;
  border-bottom: 2px solid var(--border);
  margin-bottom: 28px;
  gap: 0;
}
.report-tab {
  padding: 10px 24px;
  font-size: 14px;
  font-weight: 700;
  color: var(--text-muted);
  border: none;
  background: none;
  cursor: pointer;
  border-bottom: 3px solid transparent;
  margin-bottom: -2px;
  transition: var(--transition);
  font-family: var(--font);
}
.report-tab:hover  { color: var(--text-sub); }
.report-tab.active { color: var(--role-lead); border-bottom-color: var(--role-lead); }

/* ── 탭 패널 ── */
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ── 총점 히어로 ── */
.score-hero {
  display: flex;
  align-items: center;
  gap: 24px;
  padding: 28px 32px;
  background: var(--bg-card);
  border: 1.5px solid var(--border);
  border-radius: 20px;
  margin-bottom: 24px;
  box-shadow: var(--shadow);
}
.score-circle {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  background: var(--bg-quote);
  border: 3px solid;
}
.score-circle.pass    { border-color: #059669; }
.score-circle.partial { border-color: #d97706; }
.score-circle.fail    { border-color: #dc2626; }
.score-num {
  font-size: 28px;
  font-weight: 900;
  line-height: 1;
}
.score-circle.pass    .score-num { color: #059669; }
.score-circle.partial .score-num { color: #d97706; }
.score-circle.fail    .score-num { color: #dc2626; }
.score-max { font-size: 12px; color: var(--text-muted); }
.score-info { flex: 1; }
.score-grade { font-size: 22px; font-weight: 900; color: var(--text-primary); margin-bottom: 6px; }
.score-char {
  font-size: 14px;
  color: var(--text-sub);
  display: flex;
  align-items: center;
  gap: 8px;
}
.score-retry-btn {
  height: 38px;
  padding: 0 18px;
  border-radius: 8px;
  background: var(--bg-quote);
  border: 1.5px solid var(--border);
  color: var(--text-sub);
  font-family: var(--font);
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: var(--transition);
  display: flex;
  align-items: center;
  gap: 6px;
}
.score-retry-btn:hover { border-color: var(--role-lead); color: var(--role-lead); }
.score-retry-btn svg { width: 14px; height: 14px; stroke: currentColor; stroke-width: 2.5; fill: none; }

/* ── 점수 바 ── */
.score-bars { display: flex; flex-direction: column; gap: 14px; margin-bottom: 24px; }
.score-bar-row { }
.score-bar-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 6px;
}
.score-bar-label { font-size: 13px; font-weight: 700; color: var(--text-primary); }
.score-bar-val   { font-size: 13px; color: var(--text-muted); }
.score-bar-track {
  height: 8px;
  background: var(--bg-quote);
  border-radius: 4px;
  overflow: hidden;
}
.score-bar-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
  width: 0;
}
.score-bar-fill.r26 { background: var(--role-lead); }
.score-bar-fill.r27 { background: var(--role-manager); }
.score-bar-fill.r28 { background: var(--role-member); }

/* ── 세부 피드백 아코디언 ── */
.feedback-section { margin-bottom: 20px; }
.feedback-section-title {
  font-size: 13px;
  font-weight: 800;
  color: var(--text-muted);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 10px;
}
.feedback-card {
  background: var(--bg-card);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  margin-bottom: 8px;
}
.feedback-card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  cursor: pointer;
  transition: var(--transition);
}
.feedback-card-header:hover { background: var(--bg-quote); }
.feedback-card-left { display: flex; align-items: center; gap: 10px; }
.feedback-axis { font-size: 13px; font-weight: 700; color: var(--text-primary); }
.feedback-score-badge {
  height: 20px;
  padding: 0 8px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 700;
  display: inline-flex;
  align-items: center;
}
.feedback-score-badge.good    { background: #d1fae5; color: #065f46; }
.feedback-score-badge.mid     { background: #fef3c7; color: #92400e; }
.feedback-score-badge.low     { background: #fee2e2; color: #991b1b; }
.feedback-chevron {
  transition: transform 0.2s;
  color: var(--text-muted);
}
.feedback-card.open .feedback-chevron { transform: rotate(180deg); }
.feedback-card-body {
  display: none;
  padding: 0 16px 14px;
  font-size: 14px;
  color: var(--text-sub);
  line-height: 1.65;
}
.feedback-card.open .feedback-card-body { display: block; }

/* ── 비교 탭 ── */
.compare-empty {
  padding: 48px 24px;
  text-align: center;
  color: var(--text-muted);
}
.compare-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin-bottom: 28px;
}
@media (max-width: 767px) { .compare-grid { grid-template-columns: 1fr; } }

.compare-card {
  background: var(--bg-card);
  border: 1.5px solid var(--border);
  border-radius: 16px;
  padding: 20px;
}
.compare-card-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
}
.compare-avatar {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-weight: 700;
  font-size: 15px;
}
.compare-name { font-size: 15px; font-weight: 800; color: var(--text-primary); }
.compare-score { font-size: 22px; font-weight: 900; }
.compare-score.good    { color: #059669; }
.compare-score.mid     { color: #d97706; }
.compare-score.bad     { color: #dc2626; }

/* SVG 레이더 차트 */
.radar-wrap {
  background: var(--bg-card);
  border: 1.5px solid var(--border);
  border-radius: 16px;
  padding: 24px;
  margin-bottom: 24px;
}
.radar-title {
  font-size: 14px;
  font-weight: 700;
  color: var(--text-sub);
  margin-bottom: 16px;
}
#radarChart { display: block; margin: 0 auto; }

/* 비교 테이블 */
.compare-table { width: 100%; border-collapse: collapse; }
.compare-table th, .compare-table td {
  padding: 10px 14px;
  text-align: left;
  font-size: 13px;
  border-bottom: 1px solid var(--divider);
}
.compare-table th { color: var(--text-muted); font-weight: 700; }
.compare-table td { color: var(--text-primary); }
.compare-table tr:last-child td { border-bottom: none; }

</style>
</head>
<body>

<!-- ── 헤더 ── -->
<header class="page-header">
  <button class="btn btn-secondary" id="backBtn" style="height:36px;padding:0 12px;font-size:13px;">
    ← 돌아가기
  </button>
  <div class="header-logo">평가 리포트</div>
  <div class="theme-switcher">
    <button class="theme-btn active" data-theme-target="light">라이트</button>
    <button class="theme-btn" data-theme-target="sepia">세피아</button>
    <button class="theme-btn" data-theme-target="dark">다크</button>
  </div>
</header>

<main class="page-wrap">

  <!-- ── 탭 ── -->
  <div class="report-tabs">
    <button class="report-tab active" data-tab="single">이번 세션 리포트</button>
    <button class="report-tab" data-tab="compare">캐릭터별 비교</button>
  </div>

  <!-- ── 단일 세션 탭 ── -->
  <div class="tab-panel active" id="tabSingle">
    <!-- 총점 히어로 -->
    <div class="score-hero" id="scoreHero">
      <div class="score-circle partial" id="scoreCircle">
        <span class="score-num" id="scoreNum">—</span>
        <span class="score-max">/ 25</span>
      </div>
      <div class="score-info">
        <p class="score-grade" id="scoreGrade">결과를 불러오는 중...</p>
        <p class="score-char" id="scoreChar">
          <span class="role-badge lead" id="charBadge">파트장</span>
          <span id="charNameDisplay">이모델 파트장</span>
        </p>
      </div>
      <button class="score-retry-btn" id="retryBtn">
        <svg viewBox="0 0 24 24"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10M23 14l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
        다시 도전
      </button>
    </div>

    <!-- 점수 바 -->
    <div class="score-bars" id="scoreBars">
      <div class="score-bar-row">
        <div class="score-bar-header">
          <span class="score-bar-label">R-26 기본 역량 (15점)</span>
          <span class="score-bar-val" id="r26Val">— / 15</span>
        </div>
        <div class="score-bar-track">
          <div class="score-bar-fill r26" id="r26Bar"></div>
        </div>
      </div>
      <div class="score-bar-row">
        <div class="score-bar-header">
          <span class="score-bar-label">R-27 셀프 러닝 적합성 (5점)</span>
          <span class="score-bar-val" id="r27Val">— / 5</span>
        </div>
        <div class="score-bar-track">
          <div class="score-bar-fill r27" id="r27Bar"></div>
        </div>
      </div>
      <div class="score-bar-row">
        <div class="score-bar-header">
          <span class="score-bar-label">R-28 다중 페르소나 특화 (5점)</span>
          <span class="score-bar-val" id="r28Val">— / 5</span>
        </div>
        <div class="score-bar-track">
          <div class="score-bar-fill r28" id="r28Bar"></div>
        </div>
      </div>
    </div>

    <!-- 세부 피드백 -->
    <div class="feedback-section" id="feedbackSection">
      <p class="feedback-section-title">세부 피드백</p>
      <div id="feedbackCards">
        <div class="empty-state">
          <div class="spinner"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ── 비교 탭 ── -->
  <div class="tab-panel" id="tabCompare">
    <div id="compareContent">
      <div class="compare-empty">
        <div class="empty-state-icon">📊</div>
        <p class="empty-state-title">같은 시나리오를 2번 이상 도전하면<br>캐릭터별 비교 리포트가 표시됩니다</p>
        <p class="empty-state-desc">다른 캐릭터로 다시 도전해보세요</p>
      </div>
    </div>
  </div>

</main>

<script>
const params    = new URLSearchParams(location.search);
const SESSION_ID = params.get('session_id');
const ROLE_COLORS = { executive:'#312e81', manager:'#1e3a8a', lead:'#134e4a', member:'#78350f' };

/* ── 테마 전환 ── */
document.querySelectorAll('[data-theme-target]').forEach(btn => {
  btn.addEventListener('click', () => {
    const theme = btn.dataset.themeTarget;
    document.documentElement.setAttribute('data-theme', theme);
    document.querySelectorAll('[data-theme-target]').forEach(b =>
      b.classList.toggle('active', b.dataset.themeTarget === theme)
    );
  });
});

/* ── 탭 전환 ── */
document.querySelectorAll('.report-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.report-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById(`tab${tab.dataset.tab === 'single' ? 'Single' : 'Compare'}`).classList.add('active');
    if (tab.dataset.tab === 'compare') loadCompare();
  });
});

/* ── 뒤로가기 / 재도전 ── */
document.getElementById('backBtn').addEventListener('click', () => history.back());
document.getElementById('retryBtn').addEventListener('click', () => {
  const scenarioId = new URLSearchParams(location.search).get('scenario_id');
  window.location.href = `character-select.html${scenarioId ? `?scenario_id=${scenarioId}` : ''}`;
});

/* ── 피드백 아코디언 ── */
document.addEventListener('click', e => {
  const header = e.target.closest('.feedback-card-header');
  if (!header) return;
  header.closest('.feedback-card').classList.toggle('open');
});

/* ── 리포트 로드 ── */
async function loadReport() {
  try {
    const res  = await fetch(`/api/sessions/${SESSION_ID}/report`);
    const data = await res.json();
    renderReport(data);
  } catch {
    renderDemoReport();
  }
}

function renderReport(data) {
  const total = data.total_score || 0;
  const gradeClass = total >= 23.75 ? 'pass' : total >= 20 ? 'partial' : 'fail';
  const gradeText  = total >= 23.75 ? '됐어! 🎉' : total >= 20 ? '아쉽지만...' : '느낌이 안 와';

  document.getElementById('scoreNum').textContent = total.toFixed(1);
  document.getElementById('scoreCircle').className = `score-circle ${gradeClass}`;
  document.getElementById('scoreGrade').textContent = gradeText;

  if (data.character) {
    const roleKey = { '상위리더':'executive','그룹장':'manager','파트장':'lead','부서원':'member' }[data.character.role_level] || 'lead';
    document.getElementById('charBadge').textContent = data.character.role_level || '—';
    document.getElementById('charNameDisplay').textContent = data.character.name || '—';
    document.getElementById('retryBtn').dataset.scenarioId = data.scenario_id;
  }

  const scores = data.scores || {};
  animateBar('r26Bar', 'r26Val', scores.r26 || 0, 15);
  animateBar('r27Bar', 'r27Val', scores.r27 || 0, 5);
  animateBar('r28Bar', 'r28Val', scores.r28 || 0, 5);

  renderFeedback(data.feedback || []);
}

function renderDemoReport() {
  renderReport({
    total_score: 18.5,
    character: { name: '이모델 파트장', role_level: '파트장' },
    scores: { r26: 11.0, r27: 4.0, r28: 3.5 },
    feedback: [
      { axis: 'R-26 행동지표 관찰 가능성', score: 0.8, text: '학습자 발화에서 구체적 행동 지표가 관찰되었습니다. 특히 3-5턴에서 상대방 감정을 인식하고 반응하는 모습이 명확하게 나타났습니다.' },
      { axis: 'R-26 시나리오 구체성', score: 0.7, text: '상황에 맞는 발화를 유지했으나, 일부 추상적 표현이 있었습니다. 구체적 사실이나 사례를 더 활용하면 좋을 것 같습니다.' },
      { axis: 'R-28 캐릭터 페르소나 일관성', score: 0.6, text: 'AI 캐릭터가 파트장 A의 페르소나를 전반적으로 유지했습니다. 감정 단계 전환 시 일관성이 약간 흔들렸습니다.' }
    ]
  });
}

function animateBar(barId, valId, value, max) {
  document.getElementById(valId).textContent = `${value.toFixed(1)} / ${max}`;
  requestAnimationFrame(() => {
    document.getElementById(barId).style.width = `${(value / max) * 100}%`;
  });
}

function renderFeedback(items) {
  const container = document.getElementById('feedbackCards');
  if (!items.length) {
    container.innerHTML = '<p style="color:var(--text-muted);font-size:14px;">피드백 데이터가 없습니다.</p>';
    return;
  }
  container.innerHTML = items.map(item => {
    const scoreClass = item.score >= 0.8 ? 'good' : item.score >= 0.5 ? 'mid' : 'low';
    const scoreLabel = item.score >= 0.8 ? '우수' : item.score >= 0.5 ? '보통' : '미흡';
    return `
      <div class="feedback-card">
        <div class="feedback-card-header">
          <div class="feedback-card-left">
            <span class="feedback-axis">${escHtml(item.axis)}</span>
            <span class="feedback-score-badge ${scoreClass}">${scoreLabel} (${item.score.toFixed(1)})</span>
          </div>
          <svg class="feedback-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9l6 6 6-6"/></svg>
        </div>
        <div class="feedback-card-body">${escHtml(item.text)}</div>
      </div>`;
  }).join('');
}

/* ── 비교 리포트 ── */
async function loadCompare() {
  const scenarioId = new URLSearchParams(location.search).get('scenario_id');
  if (!scenarioId) return;
  try {
    const res  = await fetch(`/api/sessions/compare?session_id=${SESSION_ID}&scenario_id=${scenarioId}`);
    const data = await res.json();
    if (data.sessions && data.sessions.length >= 2) renderCompare(data);
  } catch { /* 데모 모드 유지 */ }
}

function renderCompare(data) {
  const container = document.getElementById('compareContent');
  const sessions  = data.sessions;
  const axes      = ['R-26', 'R-27', 'R-28', '총점'];
  const colors    = sessions.map(s => {
    const rk = { '상위리더':'executive','그룹장':'manager','파트장':'lead','부서원':'member' }[s.character?.role_level] || 'lead';
    return ROLE_COLORS[rk];
  });

  container.innerHTML = `
    <div class="compare-grid">
      ${sessions.map((s, i) => `
        <div class="compare-card">
          <div class="compare-card-header">
            <div class="compare-avatar" style="background:${colors[i]}">${(s.character?.name || '?')[0]}</div>
            <div>
              <p class="compare-name">${escHtml(s.character?.name || '—')}</p>
              <span class="role-badge ${['executive','manager','lead','member'][i % 4]}">${s.character?.role_level || '—'}</span>
            </div>
          </div>
          <p class="compare-score ${s.total_score >= 23.75 ? 'good' : s.total_score >= 20 ? 'mid' : 'bad'}">
            ${(s.total_score || 0).toFixed(1)}<small style="font-size:14px;font-weight:400;color:var(--text-muted)"> / 25</small>
          </p>
        </div>`).join('')}
    </div>
    <div class="radar-wrap">
      <p class="radar-title">축별 비교</p>
      ${buildRadar(sessions, colors)}
    </div>
    <table class="compare-table">
      <thead><tr><th>평가 축</th>${sessions.map(s => `<th>${escHtml(s.character?.name || '—')}</th>`).join('')}</tr></thead>
      <tbody>
        ${axes.map(axis => `
          <tr>
            <td>${axis}</td>
            ${sessions.map(s => {
              const v = axis === '총점' ? s.total_score : (s.scores || {})[axis.toLowerCase().replace('-','')];
              return `<td>${v != null ? parseFloat(v).toFixed(1) : '—'}</td>`;
            }).join('')}
          </tr>`).join('')}
      </tbody>
    </table>`;
}

function buildRadar(sessions, colors) {
  const W = 300, CX = 150, CY = 150, R = 110;
  const axes = ['R-26\n(15점)', 'R-27\n(5점)', 'R-28\n(5점)', '페르소나\n일관성', '리포트\n정확성'];
  const N = axes.length;
  const angle = i => (i * 2 * Math.PI / N) - Math.PI / 2;
  const pt = (val, max, i) => {
    const r = (val / max) * R;
    return [CX + r * Math.cos(angle(i)), CY + r * Math.sin(angle(i))];
  };

  let svg = `<svg id="radarChart" width="${W}" height="${W}" viewBox="0 0 ${W} ${W}">`;

  // 격자
  for (let ring = 1; ring <= 5; ring++) {
    const pts = Array.from({length: N}, (_, i) => {
      const r = (ring / 5) * R;
      return `${CX + r * Math.cos(angle(i))},${CY + r * Math.sin(angle(i))}`;
    }).join(' ');
    svg += `<polygon points="${pts}" fill="none" stroke="var(--border)" stroke-width="1"/>`;
  }
  // 축 선
  for (let i = 0; i < N; i++) {
    const [x, y] = pt(1, 1, i);
    svg += `<line x1="${CX}" y1="${CY}" x2="${CX + R * Math.cos(angle(i))}" y2="${CY + R * Math.sin(angle(i))}" stroke="var(--border)" stroke-width="1"/>`;
  }

  // 데이터 폴리곤
  const maxVals = [15, 5, 5, 1, 1];
  sessions.forEach((s, si) => {
    const scores = s.scores || {};
    const vals   = [scores.r26 || 0, scores.r27 || 0, scores.r28 || 0, scores.r28 ? 0.8 : 0, 0.7];
    const pts    = vals.map((v, i) => pt(v, maxVals[i], i).join(',')).join(' ');
    svg += `<polygon points="${pts}" fill="${colors[si]}" fill-opacity="0.15" stroke="${colors[si]}" stroke-width="2"/>`;
  });

  // 레이블
  for (let i = 0; i < N; i++) {
    const lx = CX + (R + 22) * Math.cos(angle(i));
    const ly = CY + (R + 22) * Math.sin(angle(i));
    const lines = axes[i].split('\n');
    svg += `<text x="${lx}" y="${ly - (lines.length-1)*7}" text-anchor="middle" font-size="10" fill="var(--text-muted)" font-family="'Pretendard',sans-serif">`;
    lines.forEach((line, li) => {
      svg += `<tspan x="${lx}" dy="${li === 0 ? 0 : 13}">${line}</tspan>`;
    });
    svg += `</text>`;
  }
  svg += `</svg>`;
  return svg;
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

loadReport();
</script>
