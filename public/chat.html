<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>대화 — Multi-Persona Roleplay</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<link rel="stylesheet" href="css/design-system.css">
<style>

/* ═══════════════════════════════════════════════
   채팅 화면 전용 스타일
   ═══════════════════════════════════════════════ */
body { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

/* ── 채팅 헤더 ── */
.chat-header {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 12px 24px;
  background: var(--bg-card);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  position: relative;
  z-index: 10;
}
.back-btn {
  width: 36px;
  height: 36px;
  border-radius: 8px;
  border: 1.5px solid var(--border);
  background: var(--bg-card);
  color: var(--text-sub);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: var(--transition);
  flex-shrink: 0;
}
.back-btn:hover { border-color: var(--border-hover); background: var(--bg-quote); }
.back-btn svg { width: 16px; height: 16px; stroke: currentColor; stroke-width: 2.5; fill: none; }

/* 미니 캐릭터 카드 */
.char-mini {
  display: flex;
  align-items: center;
  gap: 10px;
  flex: 1;
  min-width: 0;
}
.char-mini-avatar {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
  color: #fff;
  font-weight: 700;
}
.char-mini-info { min-width: 0; }
.char-mini-name {
  font-size: 15px;
  font-weight: 800;
  color: var(--text-primary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.char-mini-role {
  font-size: 12px;
  color: var(--text-muted);
}

/* 감정 단계 뱃지 */
.emotion-badge {
  display: inline-flex;
  align-items: center;
  height: 20px;
  padding: 0 8px;
  border-radius: 4px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.04em;
  background: var(--bg-quote);
  border: 1px solid var(--border);
  color: var(--text-muted);
  flex-shrink: 0;
}

/* 턴 카운터 */
.turn-counter {
  font-size: 12px;
  color: var(--text-muted);
  flex-shrink: 0;
  white-space: nowrap;
}

.chat-header-right {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}

/* ── 메시지 영역 ── */
.messages-wrap {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

/* 메시지 버블 */
.msg {
  display: flex;
  gap: 10px;
  max-width: 72%;
  animation: msgIn 0.2s ease both;
}
@keyframes msgIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}
.msg.ai   { align-self: flex-start; }
.msg.user { align-self: flex-end; flex-direction: row-reverse; }

.msg-avatar {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 15px;
  flex-shrink: 0;
  color: #fff;
  font-weight: 700;
  margin-top: 2px;
}

.msg-bubble {
  padding: 12px 16px;
  border-radius: 16px;
  font-size: 15px;
  line-height: 1.65;
  position: relative;
  word-break: break-word;
}
.msg.ai .msg-bubble {
  background: var(--bg-quote);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
  border-left: 3px solid;
  color: var(--text-primary);
}
.msg.user .msg-bubble {
  color: #fff;
  border-bottom-right-radius: 4px;
}
.msg-time {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 4px;
  align-self: flex-end;
}

/* 타이핑 인디케이터 */
.typing-indicator {
  display: flex;
  gap: 10px;
  align-items: flex-end;
  max-width: 72%;
  align-self: flex-start;
}
.typing-dots {
  background: var(--bg-quote);
  border: 1px solid var(--border);
  border-radius: 16px;
  border-bottom-left-radius: 4px;
  padding: 14px 18px;
  display: flex;
  gap: 4px;
  align-items: center;
}
.typing-dots span {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--text-muted);
  animation: typingPulse 1.2s ease-in-out infinite;
}
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes typingPulse {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
  30% { transform: translateY(-4px); opacity: 1; }
}
.typing-indicator.hidden { display: none; }

/* 감정 단계 전환 알림 */
.stage-change-notice {
  align-self: center;
  background: var(--bg-quote);
  border: 1px dashed var(--border);
  border-radius: 8px;
  padding: 6px 14px;
  font-size: 12px;
  color: var(--text-muted);
  font-style: italic;
}

/* ── 입력 영역 ── */
.chat-input-area {
  background: var(--bg-card);
  border-top: 1px solid var(--border);
  padding: 16px 24px;
  flex-shrink: 0;
}
.input-row {
  display: flex;
  gap: 10px;
  align-items: flex-end;
}
.msg-textarea {
  flex: 1;
  min-height: 44px;
  max-height: 120px;
  padding: 10px 14px;
  background: var(--bg-input);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  color: var(--text-primary);
  font-size: 15px;
  font-family: var(--font);
  line-height: 1.5;
  resize: none;
  outline: none;
  transition: var(--transition);
  overflow-y: auto;
}
.msg-textarea::placeholder { color: var(--text-placeholder); }
.msg-textarea:focus { border-color: var(--border-focus); }

.send-btn {
  width: 44px;
  height: 44px;
  border-radius: 10px;
  border: none;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: var(--transition);
  flex-shrink: 0;
}
.send-btn svg { width: 18px; height: 18px; stroke: #fff; stroke-width: 2.5; fill: none; }
.send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.send-btn:not(:disabled):hover { filter: brightness(1.1); transform: scale(1.05); }

/* 하단 도구 바 */
.chat-tools {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 10px;
}
.turn-info { font-size: 12px; color: var(--text-muted); }
.end-chat-btn {
  height: 32px;
  padding: 0 14px;
  border-radius: 6px;
  border: 1.5px solid var(--border);
  background: var(--bg-card);
  color: var(--text-sub);
  font-family: var(--font);
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  transition: var(--transition);
  display: flex;
  align-items: center;
  gap: 5px;
}
.end-chat-btn:hover { border-color: var(--danger); color: var(--danger); }
.end-chat-btn svg { width: 13px; height: 13px; stroke: currentColor; stroke-width: 2.5; fill: none; }
.end-chat-btn:disabled { opacity: 0.4; cursor: not-allowed; }

@media (max-width: 767px) {
  .messages-wrap { padding: 16px; }
  .chat-input-area { padding: 12px 16px; }
  .msg { max-width: 88%; }
  .chat-header { padding: 10px 16px; }
}

</style>
</head>
<body>

<!-- ── 채팅 헤더 ── -->
<header class="chat-header">
  <button class="back-btn" id="backBtn" aria-label="뒤로가기">
    <svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
  </button>
  <div class="char-mini">
    <div class="char-mini-avatar" id="miniAvatar">?</div>
    <div class="char-mini-info">
      <p class="char-mini-name" id="miniName">로딩 중...</p>
      <p class="char-mini-role" id="miniRole">—</p>
    </div>
  </div>
  <div class="chat-header-right">
    <span class="emotion-badge" id="emotionBadge" style="display:none"></span>
    <span class="turn-counter" id="turnCounter">0 턴</span>
    <div class="theme-switcher">
      <button class="theme-btn active" data-theme-target="light">라이트</button>
      <button class="theme-btn" data-theme-target="sepia">세피아</button>
      <button class="theme-btn" data-theme-target="dark">다크</button>
    </div>
  </div>
</header>

<!-- ── 메시지 영역 ── -->
<main class="messages-wrap" id="messagesWrap" aria-live="polite" aria-label="대화 내용">
  <!-- 메시지가 여기에 삽입됨 -->
</main>

<!-- ── 타이핑 인디케이터 ── -->
<div class="typing-indicator hidden" id="typingIndicator">
  <div class="msg-avatar" id="typingAvatar" style="background:#134e4a">?</div>
  <div class="typing-dots">
    <span></span><span></span><span></span>
  </div>
</div>

<!-- ── 입력 영역 ── -->
<footer class="chat-input-area">
  <div class="input-row">
    <textarea class="msg-textarea" id="msgInput"
      placeholder="메시지를 입력하세요... (Enter: 전송, Shift+Enter: 줄바꿈)"
      rows="1" aria-label="메시지 입력"></textarea>
    <button class="send-btn" id="sendBtn" disabled aria-label="메시지 전송">
      <svg viewBox="0 0 24 24"><path d="M22 2L11 13M22 2L15 22 11 13 2 9l20-7z"/></svg>
    </button>
  </div>
  <div class="chat-tools">
    <span class="turn-info" id="turnInfo">최소 3턴 이후 평가 가능</span>
    <button class="end-chat-btn" id="endChatBtn" disabled aria-label="대화 종료 및 평가">
      <svg viewBox="0 0 24 24"><path d="M9 12l2 2 4-4M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
      평가 받기
    </button>
  </div>
</footer>

<script>
/* ── 상태 ── */
const params = new URLSearchParams(location.search);
const CHARACTER_ID = params.get('character');
const SESSION_ID   = params.get('session_id') || null;

const ROLE_COLORS = { executive: '#312e81', manager: '#1e3a8a', lead: '#134e4a', member: '#78350f' };

let sessionId   = SESSION_ID;
let turnCount   = 0;
let isWaiting   = false;
let charData    = null;

/* ── 테마 전환 ── */
document.querySelectorAll('[data-theme-target]').forEach(btn => {
  btn.addEventListener('click', () => {
    const theme = btn.dataset.themeTarget;
    document.documentElement.setAttribute('data-theme', theme);
    document.querySelectorAll('[data-theme-target]').forEach(b =>
      b.classList.toggle('active', b.dataset.themeTarget === theme)
    );
  });
});

/* ── 뒤로가기 ── */
document.getElementById('backBtn').addEventListener('click', () => {
  if (turnCount > 0 && !confirm('대화를 중단하시겠습니까? 진행 내용은 저장되지 않습니다.')) return;
  history.back();
});

/* ── 입력창 auto-resize ── */
const msgInput = document.getElementById('msgInput');
const sendBtn  = document.getElementById('sendBtn');

msgInput.addEventListener('input', () => {
  msgInput.style.height = 'auto';
  msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + 'px';
  sendBtn.disabled = msgInput.value.trim().length === 0 || isWaiting;
});

msgInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (!sendBtn.disabled) sendMessage();
  }
});

sendBtn.addEventListener('click', sendMessage);
document.getElementById('endChatBtn').addEventListener('click', endChat);

/* ── 캐릭터 정보 로드 ── */
async function loadCharacter() {
  try {
    const res  = await fetch(`/api/characters/${CHARACTER_ID}`);
    const data = await res.json();
    charData = data.character;
    applyCharacterUI(charData);
    await initSession();
  } catch {
    applyDemoCharacter();
    addSystemMsg('데모 모드: 서버에 연결할 수 없어 데모로 실행됩니다.');
  }
}

function applyCharacterUI(char) {
  const roleKey = { '상위리더':'executive','그룹장':'manager','파트장':'lead','부서원':'member' }[char.role_level] || 'lead';
  const color   = ROLE_COLORS[roleKey];

  document.getElementById('miniAvatar').textContent = char.name ? char.name[0] : '?';
  document.getElementById('miniAvatar').style.background = color;
  document.getElementById('typingAvatar').textContent = char.name ? char.name[0] : '?';
  document.getElementById('typingAvatar').style.background = color;
  document.getElementById('miniName').textContent = char.name || '—';
  document.getElementById('miniRole').textContent = char.role_level || '—';
  document.title = `${char.name}과 대화 — AI 롤플레잉`;

  document.querySelectorAll('.send-btn').forEach(b => b.style.background = color);

  if (char.emotion_stages && char.emotion_stages.length > 0) {
    const badge = document.getElementById('emotionBadge');
    badge.textContent = char.emotion_stages[0].stage || '초기';
    badge.style.display = 'inline-flex';
  }
}

function applyDemoCharacter() {
  charData = { id: 3, name: '이모델 파트장', role_level: '파트장',
    persona_prompt: '당신은 AI센터의 파트장입니다.', emotion_stages: [{stage:'방어'}] };
  applyCharacterUI(charData);
}

/* ── 세션 초기화 ── */
async function initSession() {
  if (sessionId) return;
  try {
    const res  = await fetch('/api/sessions', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ character_id: CHARACTER_ID, learner_id: 1 })
    });
    const data = await res.json();
    sessionId = data.session_id;
  } catch { /* 데모 모드 */ }
}

/* ── 메시지 전송 ── */
async function sendMessage() {
  const text = msgInput.value.trim();
  if (!text || isWaiting) return;

  isWaiting = true;
  sendBtn.disabled = true;
  msgInput.value = '';
  msgInput.style.height = 'auto';

  turnCount++;
  updateTurnUI();
  appendMsg('user', text);
  showTyping(true);

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ session_id: sessionId, message: text })
    });

    if (!res.ok) throw new Error('Chat API error');

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let aiText = '';
    let msgEl = null;

    showTyping(false);
    msgEl = appendMsg('ai', '', true);

    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      const chunk = decoder.decode(value);
      const lines = chunk.split('\n').filter(l => l.startsWith('data:'));
      for (const line of lines) {
        try {
          const json = JSON.parse(line.slice(5).trim());
          if (json.token) {
            aiText += json.token;
            updateMsgEl(msgEl, aiText);
          }
          if (json.emotion_stage) updateEmotionBadge(json.emotion_stage);
        } catch { /* partial chunk */ }
      }
    }
    if (!aiText) updateMsgEl(msgEl, '(응답 없음)');
  } catch (err) {
    showTyping(false);
    appendMsg('ai', `데모 응답입니다. 실제 서버에 연결하면 AI 캐릭터의 응답이 여기에 표시됩니다. (오류: ${err.message})`);
  }

  isWaiting = false;
  sendBtn.disabled = false;
  msgInput.focus();
}

/* ── 대화 종료 ── */
function endChat() {
  if (turnCount < 3) return;
  window.location.href = `report.html?session_id=${sessionId}`;
}

/* ── UI 헬퍼 ── */
function appendMsg(role, text, streaming = false) {
  const wrap = document.getElementById('messagesWrap');
  const char = charData || {};
  const roleKey = { '상위리더':'executive','그룹장':'manager','파트장':'lead','부서원':'member' }[char.role_level] || 'lead';
  const color = ROLE_COLORS[roleKey];

  const avatarText = role === 'ai' ? (char.name ? char.name[0] : 'A') : '나';
  const avatarBg   = role === 'ai' ? color : '#374151';

  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `
    <div class="msg-avatar" style="background:${avatarBg}">${avatarText}</div>
    <div>
      <div class="msg-bubble ${role === 'ai' ? '' : ''}" style="${
        role === 'ai'
          ? `border-left-color:${color}`
          : `background:${color}`
      }">${escHtml(text)}</div>
      <div class="msg-time">${now()}</div>
    </div>`;
  if (role === 'ai') {
    div.querySelector('.msg-bubble').style.borderLeftColor = color;
  }
  wrap.appendChild(div);
  wrap.scrollTop = wrap.scrollHeight;
  return div.querySelector('.msg-bubble');
}

function updateMsgEl(el, text) {
  if (el) el.textContent = text;
  const wrap = document.getElementById('messagesWrap');
  wrap.scrollTop = wrap.scrollHeight;
}

function addSystemMsg(text) {
  const wrap = document.getElementById('messagesWrap');
  const div = document.createElement('div');
  div.className = 'stage-change-notice';
  div.textContent = text;
  wrap.appendChild(div);
  wrap.scrollTop = wrap.scrollHeight;
}

function showTyping(show) {
  document.getElementById('typingIndicator').classList.toggle('hidden', !show);
  if (show) {
    const wrap = document.getElementById('messagesWrap');
    wrap.scrollTop = wrap.scrollHeight;
  }
}

function updateEmotionBadge(stage) {
  const badge = document.getElementById('emotionBadge');
  badge.textContent = stage;
  badge.style.display = 'inline-flex';
  addSystemMsg(`감정 단계 전환: ${stage}`);
}

function updateTurnUI() {
  document.getElementById('turnCounter').textContent = `${turnCount} 턴`;
  const endBtn = document.getElementById('endChatBtn');
  const info   = document.getElementById('turnInfo');
  if (turnCount >= 3) {
    endBtn.disabled = false;
    info.textContent = `${turnCount}턴 완료 — 평가 받기 가능`;
  } else {
    info.textContent = `${3 - turnCount}턴 더 대화하면 평가 가능`;
  }
}

function now() {
  const d = new Date();
  return `${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

loadCharacter();
</script>
</body>
</html>
