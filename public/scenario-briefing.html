<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>상황 브리핑</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<link rel="stylesheet" href="css/design-system.css">
<link rel="stylesheet" href="css/scenario-briefing.css">
</head>
<body>

<!-- ── 히어로 배경 (시나리오 테마) ── -->
<div class="briefing-hero" id="briefingHero">
  <div class="hero-inner">
    <button class="back-link" id="backBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      시나리오 선택으로
    </button>
    <div class="hero-badge" id="heroCaseName">CASE</div>
    <h1 class="hero-title" id="heroTitle">상황을 불러오는 중...</h1>
    <p class="hero-sub" id="heroSub"></p>
  </div>
</div>

<!-- ── 브리핑 카드 영역 ── -->
<main class="briefing-wrap">

  <!-- 도입 안내 -->
  <div class="intro-bar">
    <p class="intro-text">대화를 시작하기 전, 이 상황을 충분히 이해하고 시작하세요.</p>
  </div>

  <!-- 5요소 그리드 -->
  <div class="briefing-grid" id="briefingGrid">
    <!-- JS에서 동적 주입 -->
    <div class="briefing-loading">
      <div class="spinner"></div>
      <p>상황 정보를 불러오는 중...</p>
    </div>
  </div>

  <!-- CTA -->
  <div class="briefing-cta">
    <button class="cta-btn" id="ctaBtn" disabled>
      캐릭터 선택하기
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </button>
    <p class="cta-hint">역할을 선택하고 대화에 참여하세요</p>
  </div>

</main>

<script src="js/scenario-briefing.js" defer></script>
</body>
</html>
