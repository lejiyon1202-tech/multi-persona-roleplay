<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자 대시보드 — Multi-Persona Roleplay</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<link rel="stylesheet" href="css/design-system.css">
<link rel="stylesheet" href="css/admin.css">
</head>
<body>

<!-- ── 인증 오버레이 ── -->
<div class="auth-overlay" id="authOverlay">
  <div class="auth-card">
    <h2 class="auth-title">관리자 로그인</h2>
    <p class="auth-desc">관리자 토큰을 입력하세요.</p>
    <form class="auth-form" id="authForm">
      <input type="password" class="input-field" id="tokenInput" placeholder="Admin Token" autocomplete="current-password">
      <p class="auth-error hidden" id="authError">토큰이 올바르지 않습니다.</p>
      <button type="submit" class="btn btn-primary">로그인</button>
    </form>
  </div>
</div>

<!-- ── 헤더 ── -->
<header class="page-header">
  <div class="header-logo">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
    관리자 대시보드
  </div>
  <div class="flex-row-center">
    <a href="index.html" class="btn btn-secondary btn-sm">← 학습자 화면</a>
  </div>
</header>

<!-- ── 레이아웃 ── -->
<div class="admin-layout hidden" id="adminLayout">

  <!-- 사이드바 -->
  <nav class="admin-sidebar">
    <button class="nav-item active" data-section="scenarios">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/></svg>
      시나리오 관리
    </button>
    <button class="nav-item" data-section="learners">
      <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
      학습자 현황
    </button>
    <button class="nav-item" data-section="stats">
      <svg viewBox="0 0 24 24"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>
      세션 통계
    </button>
  </nav>

  <!-- 콘텐츠 -->
  <main class="admin-content">

    <!-- 시나리오 관리 섹션 -->
    <section id="sectionScenarios">
      <div class="section-header">
        <h2 class="section-title">시나리오 관리</h2>
        <button class="btn btn-primary" id="addScenarioBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
          새 시나리오 추가
        </button>
      </div>
      <div class="scenario-list" id="scenarioList">
        <div class="empty-state"><div class="spinner"></div></div>
      </div>
    </section>

    <!-- 학습자 현황 섹션 -->
    <section id="sectionLearners" class="hidden">
      <div class="section-header">
        <h2 class="section-title">학습자 현황</h2>
      </div>
      <div id="learnersContent">
        <div class="empty-state">
          <div class="empty-state-icon">📋</div>
          <p class="empty-state-title">학습자 데이터가 없습니다</p>
        </div>
      </div>
    </section>

    <!-- 통계 섹션 -->
    <section id="sectionStats" class="hidden">
      <div class="section-header">
        <h2 class="section-title">세션 통계</h2>
      </div>
      <div class="char-count-grid" id="statsCards">
        <div class="stat-card"><p class="stat-label">총 세션</p><p class="stat-val" id="statSessions">—</p></div>
        <div class="stat-card"><p class="stat-label">완료된 평가</p><p class="stat-val" id="statEvals">—</p></div>
        <div class="stat-card"><p class="stat-label">평균 점수</p><p class="stat-val" id="statAvg">—</p></div>
      </div>
    </section>

  </main>
</div>

<!-- ── 시나리오 편집 모달 ── -->
<div class="modal-overlay hidden" id="scenarioModal">
  <div class="modal">
    <h3 class="modal-title" id="scenarioModalTitle">새 시나리오</h3>
    <form class="modal-form" id="scenarioForm">
      <input type="hidden" id="scenarioId">
      <div class="field-group">
        <label class="field-label" for="fTitle">시나리오 제목 *</label>
        <input type="text" class="input-field" id="fTitle" placeholder="예: 조직 방향성 정렬" required>
      </div>
      <div class="field-group">
        <label class="field-label" for="fCaseName">케이스명</label>
        <input type="text" class="input-field" id="fCaseName" placeholder="예: Case Study 01">
      </div>
      <div class="field-group">
        <label class="field-label" for="fContext">상황 설명</label>
        <textarea class="input-field" id="fContext" rows="3" placeholder="학습 상황 및 배경 설명"></textarea>
      </div>
      <div class="field-group">
        <label class="field-label" for="fLearnerRole">학습자 역할</label>
        <input type="text" class="input-field" id="fLearnerRole" placeholder="예: 김센터 그룹장">
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" id="scenarioCancelBtn">취소</button>
        <button type="submit" class="btn btn-primary" id="scenarioSaveBtn">저장</button>
      </div>
    </form>
  </div>
</div>

<!-- ── 캐릭터 편집 모달 ── -->
<div class="modal-overlay hidden" id="charModal">
  <div class="modal">
    <h3 class="modal-title" id="charModalTitle">새 캐릭터</h3>
    <form class="modal-form" id="charForm">
      <input type="hidden" id="charId">
      <input type="hidden" id="charScenarioId">
      <div class="field-group">
        <label class="field-label" for="fCharName">이름 *</label>
        <input type="text" class="input-field" id="fCharName" placeholder="예: 이모델 파트장" required>
      </div>
      <div class="field-group">
        <label class="field-label" for="fCharDept">부서/직책 설명</label>
        <input type="text" class="input-field" id="fCharDept" placeholder="예: 파트장 A · AI 모델링 담당 파트">
      </div>
      <div class="field-group">
        <label class="field-label" for="fRoleLevel">역할 등급 *</label>
        <select class="input-field" id="fRoleLevel" required>
          <option value="">선택하세요</option>
          <option value="상위리더">상위리더</option>
          <option value="그룹장">그룹장</option>
          <option value="파트장">파트장</option>
          <option value="부서원">부서원</option>
        </select>
      </div>
      <div class="field-group">
        <label class="field-label" for="fSelectable">선택 가능 여부 *</label>
        <select class="input-field" id="fSelectable">
          <option value="1">선택 가능 (학습자가 대화 상대로 선택)</option>
          <option value="0">컨텍스트 전용 (조직 구조 표시용, 선택 불가)</option>
        </select>
      </div>
      <div class="field-group">
        <label class="field-label" for="fMindset">핵심 마인드 (인용구) *</label>
        <input type="text" class="input-field" id="fMindset" placeholder="예: 이런 상황이라면 우리가 먼저 선도해야 한다" required>
      </div>
      <div class="field-group">
        <label class="field-label" for="fSituation">상황 및 감정</label>
        <textarea class="input-field" id="fSituation" rows="2" placeholder="현재 상황과 감정 상태"></textarea>
      </div>
      <div class="field-group">
        <label class="field-label" for="fMission">롤플레이 미션 *</label>
        <textarea class="input-field" id="fMission" rows="2" placeholder="학습자에게 부여되는 미션" required></textarea>
      </div>
      <div class="field-group">
        <label class="field-label" for="fPersona">페르소나 프롬프트 *</label>
        <textarea class="input-field" id="fPersona" rows="4" placeholder="AI 캐릭터의 말투, 성격, 반응 패턴을 설명하는 프롬프트" required></textarea>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" id="charCancelBtn">취소</button>
        <button type="submit" class="btn btn-primary">저장</button>
      </div>
    </form>
  </div>
</div>

<script src="js/admin.js" defer></script>
</body>
</html>
