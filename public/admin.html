<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자 대시보드 — Multi-Persona Roleplay</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<link rel="stylesheet" href="css/design-system.css">
<style>

/* ═══════════════════════════════════════════════
   관리자 대시보드 전용 스타일
   ═══════════════════════════════════════════════ */
body { display: flex; flex-direction: column; min-height: 100vh; }

/* ── 인증 오버레이 ── */
.auth-overlay {
  position: fixed;
  inset: 0;
  background: var(--overlay);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}
.auth-card {
  background: var(--bg-card);
  border-radius: 20px;
  padding: 36px 32px;
  width: 360px;
  max-width: 90vw;
  box-shadow: var(--shadow-hover);
}
.auth-title { font-size: 20px; font-weight: 900; color: var(--text-primary); margin-bottom: 6px; }
.auth-desc  { font-size: 14px; color: var(--text-muted); margin-bottom: 20px; }
.auth-form  { display: flex; flex-direction: column; gap: 12px; }
.auth-error { font-size: 13px; color: var(--danger); margin-top: 4px; display: none; }

/* ── 레이아웃 ── */
.admin-layout { display: flex; flex: 1; min-height: 0; }

/* ── 사이드바 ── */
.admin-sidebar {
  width: 220px;
  background: var(--bg-card);
  border-right: 1px solid var(--border);
  padding: 20px 12px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 600;
  color: var(--text-sub);
  cursor: pointer;
  transition: var(--transition);
  border: none;
  background: none;
  font-family: var(--font);
  text-align: left;
  width: 100%;
}
.nav-item:hover  { background: var(--bg-quote); color: var(--text-primary); }
.nav-item.active { background: var(--bg-quote); color: var(--role-lead); font-weight: 800; }
.nav-item svg { width: 16px; height: 16px; stroke: currentColor; stroke-width: 2; fill: none; flex-shrink: 0; }

/* ── 콘텐츠 영역 ── */
.admin-content { flex: 1; overflow-y: auto; padding: 28px 32px; }
@media (max-width: 767px) {
  .admin-sidebar { display: none; }
  .admin-content { padding: 16px; }
}

/* ── 섹션 헤더 ── */
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}
.section-title { font-size: 20px; font-weight: 900; color: var(--text-primary); }

/* ── 시나리오 목록 ── */
.scenario-list { display: flex; flex-direction: column; gap: 12px; }
.scenario-item {
  background: var(--bg-card);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 16px;
  transition: var(--transition);
}
.scenario-item:hover { border-color: var(--border-hover); }
.scenario-item-info { flex: 1; min-width: 0; }
.scenario-item-title {
  font-size: 16px;
  font-weight: 800;
  color: var(--text-primary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.scenario-item-meta { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
.scenario-item-actions { display: flex; gap: 6px; flex-shrink: 0; }
.icon-btn {
  width: 32px;
  height: 32px;
  border-radius: 6px;
  border: 1.5px solid var(--border);
  background: var(--bg-card);
  color: var(--text-sub);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: var(--transition);
}
.icon-btn:hover { border-color: var(--border-hover); color: var(--text-primary); background: var(--bg-quote); }
.icon-btn.danger:hover { border-color: var(--danger); color: var(--danger); }
.icon-btn svg { width: 14px; height: 14px; stroke: currentColor; stroke-width: 2.5; fill: none; }

/* ── 캐릭터 그리드 (admin용) ── */
.char-admin-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
  margin-top: 16px;
}
@media (max-width: 1023px) { .char-admin-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 767px)  { .char-admin-grid { grid-template-columns: 1fr; } }

.char-admin-card {
  background: var(--bg-card);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  position: relative;
  transition: var(--transition);
}
.char-admin-card:hover { border-color: var(--border-hover); }
.char-admin-bar { height: 3px; }
.char-admin-body { padding: 14px 16px; }
.char-admin-name { font-size: 15px; font-weight: 800; color: var(--text-primary); margin-bottom: 2px; }
.char-admin-role { font-size: 12px; color: var(--text-muted); }
.char-admin-actions {
  position: absolute;
  top: 10px;
  right: 10px;
  display: flex;
  gap: 4px;
  opacity: 0;
  transition: opacity 0.2s;
}
.char-admin-card:hover .char-admin-actions { opacity: 1; }

/* ── 모달 ── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: var(--overlay);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal-overlay.hidden { display: none; }
.modal {
  background: var(--bg-card);
  border-radius: 20px;
  padding: 28px;
  width: 560px;
  max-width: 100%;
  max-height: 85vh;
  overflow-y: auto;
  box-shadow: var(--shadow-hover);
  animation: slideIn 0.22s ease;
}
@keyframes slideIn {
  from { opacity: 0; transform: translateY(-12px); }
  to   { opacity: 1; transform: translateY(0); }
}
.modal-title { font-size: 18px; font-weight: 900; color: var(--text-primary); margin-bottom: 20px; }
.modal-form  { display: flex; flex-direction: column; gap: 14px; }
.field-label { font-size: 13px; font-weight: 700; color: var(--text-sub); margin-bottom: 5px; display: block; }
.field-group { display: flex; flex-direction: column; }
.modal-footer {
  display: flex;
  justify-content: flex-end;
  gap: 10px;
  margin-top: 20px;
}
.char-count-grid {
  display: flex;
  gap: 12px;
  margin-top: 12px;
}
.stat-card {
  background: var(--bg-quote);
  border-radius: 10px;
  padding: 12px 16px;
  flex: 1;
}
.stat-label { font-size: 11px; color: var(--text-muted); margin-bottom: 3px; }
.stat-val { font-size: 22px; font-weight: 900; color: var(--text-primary); }

</style>
</head>
<body>

<!-- ── 인증 오버레이 ── -->
<div class="auth-overlay" id="authOverlay">
  <div class="auth-card">
    <h2 class="auth-title">관리자 로그인</h2>
    <p class="auth-desc">관리자 토큰을 입력하세요.</p>
    <form class="auth-form" id="authForm">
      <input type="password" class="input-field" id="tokenInput" placeholder="Admin Token" autocomplete="current-password">
      <p class="auth-error" id="authError">토큰이 올바르지 않습니다.</p>
      <button type="submit" class="btn btn-primary">로그인</button>
    </form>
  </div>
</div>

<!-- ── 헤더 ── -->
<header class="page-header">
  <div class="header-logo">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
    관리자 대시보드
  </div>
  <div style="display:flex;align-items:center;gap:10px;">
    <div class="theme-switcher">
      <button class="theme-btn active" data-theme-target="light">라이트</button>
      <button class="theme-btn" data-theme-target="sepia">세피아</button>
      <button class="theme-btn" data-theme-target="dark">다크</button>
    </div>
    <a href="index.html" class="btn btn-secondary" style="height:32px;padding:0 12px;font-size:12px;">← 학습자 화면</a>
  </div>
</header>

<!-- ── 레이아웃 ── -->
<div class="admin-layout" id="adminLayout" style="display:none">

  <!-- 사이드바 -->
  <nav class="admin-sidebar">
    <button class="nav-item active" data-section="scenarios">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/></svg>
      시나리오 관리
    </button>
    <button class="nav-item" data-section="learners">
      <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
      학습자 현황
    </button>
    <button class="nav-item" data-section="stats">
      <svg viewBox="0 0 24 24"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>
      세션 통계
    </button>
  </nav>

  <!-- 콘텐츠 -->
  <main class="admin-content">

    <!-- 시나리오 관리 섹션 -->
    <section id="sectionScenarios">
      <div class="section-header">
        <h2 class="section-title">시나리오 관리</h2>
        <button class="btn btn-primary" id="addScenarioBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
          새 시나리오 추가
        </button>
      </div>
      <div class="scenario-list" id="scenarioList">
        <div class="empty-state"><div class="spinner"></div></div>
      </div>
    </section>

    <!-- 학습자 현황 섹션 -->
    <section id="sectionLearners" style="display:none">
      <div class="section-header">
        <h2 class="section-title">학습자 현황</h2>
      </div>
      <div id="learnersContent">
        <div class="empty-state">
          <div class="empty-state-icon">📋</div>
          <p class="empty-state-title">학습자 데이터가 없습니다</p>
        </div>
      </div>
    </section>

    <!-- 통계 섹션 -->
    <section id="sectionStats" style="display:none">
      <div class="section-header">
        <h2 class="section-title">세션 통계</h2>
      </div>
      <div class="char-count-grid" id="statsCards">
        <div class="stat-card"><p class="stat-label">총 세션</p><p class="stat-val" id="statSessions">—</p></div>
        <div class="stat-card"><p class="stat-label">완료된 평가</p><p class="stat-val" id="statEvals">—</p></div>
        <div class="stat-card"><p class="stat-label">평균 점수</p><p class="stat-val" id="statAvg">—</p></div>
      </div>
    </section>

  </main>
</div>

<!-- ── 시나리오 편집 모달 ── -->
<div class="modal-overlay hidden" id="scenarioModal">
  <div class="modal">
    <h3 class="modal-title" id="scenarioModalTitle">새 시나리오</h3>
    <form class="modal-form" id="scenarioForm">
      <input type="hidden" id="scenarioId">
      <div class="field-group">
        <label class="field-label" for="fTitle">시나리오 제목 *</label>
        <input type="text" class="input-field" id="fTitle" placeholder="예: 조직 방향성 정렬" required>
      </div>
      <div class="field-group">
        <label class="field-label" for="fCaseName">케이스명</label>
        <input type="text" class="input-field" id="fCaseName" placeholder="예: Case Study 01">
      </div>
      <div class="field-group">
        <label class="field-label" for="fContext">상황 설명</label>
        <textarea class="input-field" id="fContext" rows="3" placeholder="학습 상황 및 배경 설명"></textarea>
      </div>
      <div class="field-group">
        <label class="field-label" for="fLearnerRole">학습자 역할</label>
        <input type="text" class="input-field" id="fLearnerRole" placeholder="예: 김센터 그룹장">
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" id="scenarioCancelBtn">취소</button>
        <button type="submit" class="btn btn-primary" id="scenarioSaveBtn">저장</button>
      </div>
    </form>
  </div>
</div>

<!-- ── 캐릭터 편집 모달 ── -->
<div class="modal-overlay hidden" id="charModal">
  <div class="modal">
    <h3 class="modal-title" id="charModalTitle">새 캐릭터</h3>
    <form class="modal-form" id="charForm">
      <input type="hidden" id="charId">
      <input type="hidden" id="charScenarioId">
      <div class="field-group">
        <label class="field-label" for="fCharName">이름 *</label>
        <input type="text" class="input-field" id="fCharName" placeholder="예: 이모델 파트장" required>
      </div>
      <div class="field-group">
        <label class="field-label" for="fCharDept">부서/직책 설명</label>
        <input type="text" class="input-field" id="fCharDept" placeholder="예: 파트장 A · AI 모델링 담당 파트">
      </div>
      <div class="field-group">
        <label class="field-label" for="fRoleLevel">역할 등급 *</label>
        <select class="input-field" id="fRoleLevel" required>
          <option value="">선택하세요</option>
          <option value="상위리더">상위리더</option>
          <option value="그룹장">그룹장</option>
          <option value="파트장">파트장</option>
          <option value="부서원">부서원</option>
        </select>
      </div>
      <div class="field-group">
        <label class="field-label" for="fSelectable">선택 가능 여부 *</label>
        <select class="input-field" id="fSelectable">
          <option value="1">선택 가능 (학습자가 대화 상대로 선택)</option>
          <option value="0">컨텍스트 전용 (조직 구조 표시용, 선택 불가)</option>
        </select>
      </div>
      <div class="field-group">
        <label class="field-label" for="fMindset">핵심 마인드 (인용구) *</label>
        <input type="text" class="input-field" id="fMindset" placeholder="예: 이런 상황이라면 우리가 먼저 선도해야 한다" required>
      </div>
      <div class="field-group">
        <label class="field-label" for="fSituation">상황 및 감정</label>
        <textarea class="input-field" id="fSituation" rows="2" placeholder="현재 상황과 감정 상태"></textarea>
      </div>
      <div class="field-group">
        <label class="field-label" for="fMission">롤플레이 미션 *</label>
        <textarea class="input-field" id="fMission" rows="2" placeholder="학습자에게 부여되는 미션" required></textarea>
      </div>
      <div class="field-group">
        <label class="field-label" for="fPersona">페르소나 프롬프트 *</label>
        <textarea class="input-field" id="fPersona" rows="4" placeholder="AI 캐릭터의 말투, 성격, 반응 패턴을 설명하는 프롬프트" required></textarea>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" id="charCancelBtn">취소</button>
        <button type="submit" class="btn btn-primary">저장</button>
      </div>
    </form>
  </div>
</div>

<script>
let adminToken = sessionStorage.getItem('admin_token') || '';
const ROLE_COLORS = { executive:'#312e81', manager:'#1e3a8a', lead:'#134e4a', member:'#78350f' };
const ROLE_KEY = { '상위리더':'executive','그룹장':'manager','파트장':'lead','부서원':'member' };

/* ── 테마 전환 ── */
document.querySelectorAll('[data-theme-target]').forEach(btn => {
  btn.addEventListener('click', () => {
    const theme = btn.dataset.themeTarget;
    document.documentElement.setAttribute('data-theme', theme);
    document.querySelectorAll('[data-theme-target]').forEach(b =>
      b.classList.toggle('active', b.dataset.themeTarget === theme)
    );
  });
});

/* ── 인증 ── */
if (adminToken) showAdmin();

document.getElementById('authForm').addEventListener('submit', async e => {
  e.preventDefault();
  const token = document.getElementById('tokenInput').value.trim();
  const ok = await verifyToken(token);
  if (ok) {
    adminToken = token;
    sessionStorage.setItem('admin_token', token);
    showAdmin();
  } else {
    document.getElementById('authError').style.display = 'block';
  }
});

async function verifyToken(token) {
  try {
    const res = await fetch('/api/admin/scenarios', { headers: { 'X-Admin-Token': token } });
    return res.ok;
  } catch { return false; }
}

function showAdmin() {
  document.getElementById('authOverlay').style.display = 'none';
  document.getElementById('adminLayout').style.display = 'flex';
  loadScenarios();
}

/* ── 사이드바 네비게이션 ── */
document.querySelectorAll('.nav-item').forEach(item => {
  item.addEventListener('click', () => {
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    item.classList.add('active');
    const section = item.dataset.section;
    document.getElementById('sectionScenarios').style.display = section === 'scenarios' ? '' : 'none';
    document.getElementById('sectionLearners').style.display  = section === 'learners'  ? '' : 'none';
    document.getElementById('sectionStats').style.display     = section === 'stats'     ? '' : 'none';
    if (section === 'stats') loadStats();
  });
});

/* ── API 헬퍼 ── */
async function api(method, path, body) {
  const opts = { method, headers: { 'X-Admin-Token': adminToken, 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(path, opts);
  if (!res.ok) throw new Error(`${method} ${path} → ${res.status}`);
  return res.json();
}

/* ── 시나리오 목록 ── */
async function loadScenarios() {
  const list = document.getElementById('scenarioList');
  try {
    const data = await api('GET', '/api/admin/scenarios');
    if (!data.scenarios || !data.scenarios.length) {
      list.innerHTML = `<div class="empty-state"><div class="empty-state-icon">📋</div><p class="empty-state-title">시나리오가 없습니다</p></div>`;
      return;
    }
    list.innerHTML = data.scenarios.map(s => `
      <div class="scenario-item">
        <div class="scenario-item-info">
          <p class="scenario-item-title">${escHtml(s.title)}</p>
          <p class="scenario-item-meta">${escHtml(s.case_name || '')} · 캐릭터 ${s.character_count || 0}명</p>
        </div>
        <div class="scenario-item-actions">
          <button class="icon-btn" data-action="edit-scenario" data-id="${s.id}" title="수정">
            <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
          <button class="icon-btn" data-action="manage-chars" data-id="${s.id}" data-title="${escHtml(s.title)}" title="캐릭터 관리">
            <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
          </button>
          <button class="icon-btn danger" data-action="delete-scenario" data-id="${s.id}" data-title="${escHtml(s.title)}" title="삭제">
            <svg viewBox="0 0 24 24"><path d="M3 6h18M19 6l-1 14H6L5 6M10 11v6M14 11v6M9 6V4h6v2"/></svg>
          </button>
        </div>
      </div>`).join('');
    bindScenarioListEvents();
  } catch {
    list.innerHTML = `<div class="empty-state"><p class="empty-state-title">데이터를 불러오지 못했습니다</p></div>`;
  }
}

function bindScenarioListEvents() {
  document.querySelectorAll('[data-action]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const { action, id, title } = btn.dataset;
      if (action === 'edit-scenario')   openScenarioModal(id);
      if (action === 'manage-chars')    openCharManager(id, title);
      if (action === 'delete-scenario') deleteScenario(id, title);
    });
  });
}

/* ── 시나리오 모달 ── */
document.getElementById('addScenarioBtn').addEventListener('click', () => openScenarioModal(null));
document.getElementById('scenarioCancelBtn').addEventListener('click', closeScenarioModal);
document.getElementById('scenarioForm').addEventListener('submit', saveScenario);

async function openScenarioModal(id) {
  document.getElementById('scenarioModalTitle').textContent = id ? '시나리오 수정' : '새 시나리오';
  document.getElementById('scenarioId').value = id || '';
  if (id) {
    try {
      const data = await api('GET', `/api/admin/scenarios/${id}`);
      const s = data.scenario;
      document.getElementById('fTitle').value       = s.title || '';
      document.getElementById('fCaseName').value    = s.case_name || '';
      document.getElementById('fContext').value     = s.context_description || '';
      document.getElementById('fLearnerRole').value = s.learner_role || '';
    } catch { /* 비어있는 채로 */ }
  } else {
    ['fTitle','fCaseName','fContext','fLearnerRole'].forEach(f => document.getElementById(f).value = '');
  }
  document.getElementById('scenarioModal').classList.remove('hidden');
}

function closeScenarioModal() { document.getElementById('scenarioModal').classList.add('hidden'); }

async function saveScenario(e) {
  e.preventDefault();
  const id   = document.getElementById('scenarioId').value;
  const body = {
    title:               document.getElementById('fTitle').value.trim(),
    case_name:           document.getElementById('fCaseName').value.trim(),
    context_description: document.getElementById('fContext').value.trim(),
    learner_role:        document.getElementById('fLearnerRole').value.trim()
  };
  try {
    if (id) await api('PUT',  `/api/admin/scenarios/${id}`, body);
    else    await api('POST', '/api/admin/scenarios', body);
    closeScenarioModal();
    loadScenarios();
  } catch (err) { alert('저장 실패: ' + err.message); }
}

async function deleteScenario(id, title) {
  if (!confirm(`"${title}" 시나리오를 삭제하시겠습니까?\n소속 캐릭터와 세션도 모두 삭제됩니다.`)) return;
  try { await api('DELETE', `/api/admin/scenarios/${id}`); loadScenarios(); }
  catch (err) { alert('삭제 실패: ' + err.message); }
}

/* ── 캐릭터 관리 ── */
async function openCharManager(scenarioId, scenarioTitle) {
  const list = document.getElementById('scenarioList');
  list.innerHTML = `
    <div style="margin-bottom:16px;">
      <button class="btn btn-secondary" id="backToScenarios" style="height:32px;padding:0 12px;font-size:12px;">← 시나리오 목록</button>
      <span style="font-size:16px;font-weight:800;color:var(--text-primary);margin-left:12px;">${escHtml(scenarioTitle)} — 캐릭터</span>
    </div>
    <div style="text-align:right;margin-bottom:12px;">
      <button class="btn btn-primary" id="addCharBtn" style="height:36px;">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
        캐릭터 추가
      </button>
    </div>
    <div class="char-admin-grid" id="charGrid">
      <div class="empty-state" style="grid-column:1/-1"><div class="spinner"></div></div>
    </div>`;

  document.getElementById('backToScenarios').addEventListener('click', loadScenarios);
  document.getElementById('addCharBtn').addEventListener('click', () => openCharModal(null, scenarioId));

  await loadChars(scenarioId);
}

async function loadChars(scenarioId) {
  const grid = document.getElementById('charGrid');
  try {
    const data = await api('GET', `/api/admin/scenarios/${scenarioId}/characters`);
    if (!data.characters || !data.characters.length) {
      grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><p class="empty-state-title">캐릭터가 없습니다</p></div>`;
      return;
    }
    grid.innerHTML = data.characters.map(c => {
      const rk    = ROLE_KEY[c.role_level] || 'lead';
      const color = ROLE_COLORS[rk];
      return `
        <div class="char-admin-card">
          <div class="char-admin-bar" style="background:${color}"></div>
          <div class="char-admin-body">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
              <span class="role-badge ${rk}">${escHtml(c.role_level)}</span>
              ${!c.is_selectable ? '<span style="font-size:10px;color:var(--text-muted);">컨텍스트</span>' : ''}
            </div>
            <p class="char-admin-name">${escHtml(c.name)}</p>
            <p class="char-admin-role">${escHtml(c.department || '')}</p>
          </div>
          <div class="char-admin-actions">
            <button class="icon-btn" data-action="edit-char" data-id="${c.id}" data-scenario-id="${scenarioId}" title="수정">
              <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </button>
            <button class="icon-btn danger" data-action="delete-char" data-id="${c.id}" data-scenario-id="${scenarioId}" data-name="${escHtml(c.name)}" title="삭제">
              <svg viewBox="0 0 24 24"><path d="M3 6h18M19 6l-1 14H6L5 6M10 11v6M14 11v6M9 6V4h6v2"/></svg>
            </button>
          </div>
        </div>`;
    }).join('');

    grid.querySelectorAll('[data-action]').forEach(btn => {
      btn.addEventListener('click', () => {
        const { action, id, scenarioId: sid, name } = btn.dataset;
        if (action === 'edit-char')   openCharModal(id, sid);
        if (action === 'delete-char') deleteChar(id, sid, name);
      });
    });
  } catch {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><p class="empty-state-title">불러오기 실패</p></div>`;
  }
}

/* ── 캐릭터 모달 ── */
document.getElementById('charCancelBtn').addEventListener('click', () => document.getElementById('charModal').classList.add('hidden'));
document.getElementById('charForm').addEventListener('submit', saveChar);

async function openCharModal(charId, scenarioId) {
  document.getElementById('charModalTitle').textContent = charId ? '캐릭터 수정' : '새 캐릭터';
  document.getElementById('charId').value = charId || '';
  document.getElementById('charScenarioId').value = scenarioId;
  if (charId) {
    try {
      const data = await api('GET', `/api/admin/scenarios/${scenarioId}/characters/${charId}`);
      const c = data.character;
      document.getElementById('fCharName').value  = c.name || '';
      document.getElementById('fCharDept').value  = c.department || '';
      document.getElementById('fRoleLevel').value = c.role_level || '';
      document.getElementById('fSelectable').value = c.is_selectable ? '1' : '0';
      document.getElementById('fMindset').value   = c.core_mindset || '';
      document.getElementById('fSituation').value = c.situation || '';
      document.getElementById('fMission').value   = c.mission || '';
      document.getElementById('fPersona').value   = c.persona_prompt || '';
    } catch { /* 비어있는 채로 */ }
  } else {
    ['fCharName','fCharDept','fMindset','fSituation','fMission','fPersona'].forEach(f => document.getElementById(f).value = '');
    document.getElementById('fRoleLevel').value  = '';
    document.getElementById('fSelectable').value = '1';
  }
  document.getElementById('charModal').classList.remove('hidden');
}

async function saveChar(e) {
  e.preventDefault();
  const id         = document.getElementById('charId').value;
  const scenarioId = document.getElementById('charScenarioId').value;
  const body = {
    name:           document.getElementById('fCharName').value.trim(),
    department:     document.getElementById('fCharDept').value.trim(),
    role_level:     document.getElementById('fRoleLevel').value,
    is_selectable:  document.getElementById('fSelectable').value === '1',
    core_mindset:   document.getElementById('fMindset').value.trim(),
    situation:      document.getElementById('fSituation').value.trim(),
    mission:        document.getElementById('fMission').value.trim(),
    persona_prompt: document.getElementById('fPersona').value.trim()
  };
  try {
    if (id) await api('PUT',  `/api/admin/scenarios/${scenarioId}/characters/${id}`, body);
    else    await api('POST', `/api/admin/scenarios/${scenarioId}/characters`, body);
    document.getElementById('charModal').classList.add('hidden');
    loadChars(scenarioId);
  } catch (err) { alert('저장 실패: ' + err.message); }
}

async function deleteChar(id, scenarioId, name) {
  if (!confirm(`"${name}" 캐릭터를 삭제하시겠습니까?`)) return;
  try { await api('DELETE', `/api/admin/scenarios/${scenarioId}/characters/${id}`); loadChars(scenarioId); }
  catch (err) { alert('삭제 실패: ' + err.message); }
}

/* ── 통계 ── */
async function loadStats() {
  try {
    const data = await api('GET', '/api/admin/stats');
    document.getElementById('statSessions').textContent = data.total_sessions || 0;
    document.getElementById('statEvals').textContent    = data.total_evals || 0;
    document.getElementById('statAvg').textContent      = data.avg_score ? data.avg_score.toFixed(1) : '—';
  } catch { /* 데이터 없음 */ }
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
